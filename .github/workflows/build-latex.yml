# WHY: Automatically builds LaTeX PDF when the paper changes
# ALT: Manual trigger available via workflow_dispatch

name: Build LaTeX PDF

on:
  push:
    branches: [main]
    paths:
      - "*.tex"
      - ".github/workflows/build-latex.yml"
      - ".github/tl_packages"

  pull_request:
    branches: [main]
    paths:
      - "*.tex"
      - ".github/workflows/build-latex.yml"
      - ".github/tl_packages"

  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # ASSEMBLE: Get code and set up environment
      # ============================================================

      - name: A1) Checkout repository code
        # WHY: Needed to access files for checks.
        uses: actions/checkout@v7

      # WHY: Install TeX Live in CI in a maintainable way.
      # OBS: This action installs tlmgr and packages listed in .github/tl_packages.
      - name: A2) Setup TeX Live
        uses: TeX-Live/setup-texlive-action@v4
        with:
          package-file: .github/tl_packages
          cache: true

      - name: A3) Confirm TeX binaries available
        run: |
          set -e
          which pdflatex
          pdflatex --version
          which latexmk
          latexmk --version
          kpsewhich authblk.sty

      # ============================================================
      # VALIDATE: Build PDF only
      # ============================================================

      # WHY: Validate LaTeX compiles without errors so it is ready for arXiv prep.
      # OBS: PDF is built in artifacts/ and not committed.
      - name: D1) Build PDF to validate LaTeX
        run: |
          set -e
          rm -rf artifacts
          mkdir -p artifacts
          latexmk -g -pdf -interaction=nonstopmode -halt-on-error \
            -auxdir=artifacts -outdir=artifacts \
            se210-operational-identity.tex
          test -f artifacts/se210-operational-identity.pdf
